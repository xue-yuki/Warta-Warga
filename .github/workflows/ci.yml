name: CI

on:
  push:
    branches: [main, 'fix/**']
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: test checkurl
        run: SUPABASE_DB_URL= npm run test:checkurl
      - name: test broadcast pipeline
        run: SUPABASE_DB_URL= npm run test:broadcast-pipeline
